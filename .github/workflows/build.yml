name: Build Kil0bit System Monitor

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore kil0bit-system-monitor/Kil0bitSystemMonitor.csproj

    - name: Build
      run: dotnet build kil0bit-system-monitor/Kil0bitSystemMonitor.csproj -c Release --no-restore

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Kil0bitSystemMonitor-Windows-x64
        path: |
          kil0bit-system-monitor/bin/Release/net10.0-windows10.0.22621.0/win-x64/Kil0bitSystemMonitor.exe
          kil0bit-system-monitor/bin/Release/net10.0-windows10.0.22621.0/win-x64/Kil0bitSystemMonitor.dll
          kil0bit-system-monitor/bin/Release/net10.0-windows10.0.22621.0/win-x64/Microsoft.WindowsAppRuntime.Bootstrap.dll
