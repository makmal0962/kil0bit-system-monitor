name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of version bump'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    runs-on: windows-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Git Config
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Read current version from Cargo.toml
        id: current
        shell: bash
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "CURRENT_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Compute new version
        id: bump
        shell: bash
        run: |
          IFS='.' read -r MAJOR MINOR PATCH <<< "${{ env.CURRENT_VERSION }}"
          if [ "${{ github.event.inputs.bump_type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ github.event.inputs.bump_type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Update Cargo.toml version
        shell: bash
        run: |
          sed -i "s/^version = \"${{ env.CURRENT_VERSION }}\"/version = \"${{ env.NEW_VERSION }}\"/" Cargo.toml

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to v${{ env.NEW_VERSION }}"
          branch: "chore/version-bump-v${{ env.NEW_VERSION }}"
          title: "chore: bump version to v${{ env.NEW_VERSION }}"
          body: |
            Bumping version from `${{ env.CURRENT_VERSION }}` → `${{ env.NEW_VERSION }}`
            - Bump type: `${{ github.event.inputs.bump_type }}`
            - Updated: `Cargo.toml`
          labels: version-bump
