name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 1.4.1)'
        required: true
        default: '2.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Set Version in Project
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $csproj = "Kil0bitSystemMonitor.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csproj
        Write-Host "Set version to $version in $csproj"

    - name: Restore dependencies
      run: dotnet restore Kil0bitSystemMonitor.csproj

    - name: Publish Portable EXE (Self-Contained)
      run: |
        dotnet publish Kil0bitSystemMonitor.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -p:EnableCompressionInSingleFile=true `
          -p:DebugType=none `
          -p:DebugSymbols=false `
          -o release-output
        # Rename for versioned release assets
        Rename-Item -Path "release-output/Kil0bitSystemMonitor.exe" -NewName "Kil0bitSystemMonitor-v${{ github.event.inputs.version }}.exe"


    - name: Build MSI Installer
      run: |
        # Pin to stable v5.0.2 to avoid unstable v6 auto-updates
        dotnet tool install --global wix --version 5.0.2 || dotnet tool update --global wix --version 5.0.2
        wix extension add WixToolset.UI.wixext/5.0.2 --global
        # Build Versioned MSI using the renamed EXE inside the folder
        wix build wix/main.wxs -ext WixToolset.UI.wixext `
          -d "publish=release-output" `
          -d "EXE_NAME=Kil0bitSystemMonitor-v${{ github.event.inputs.version }}.exe" `
          -o "Kil0bitSystemMonitor-v${{ github.event.inputs.version }}-Setup.msi"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Kil0bit System Monitor v${{ github.event.inputs.version }}
        draft: true
        prerelease: false
        body: |
          Kil0bit System Monitor v${{ github.event.inputs.version }}
          
          (See README.md for full highlights and installation guide.)
        files: |
          release-output/Kil0bitSystemMonitor-v${{ github.event.inputs.version }}.exe
          Kil0bitSystemMonitor-v${{ github.event.inputs.version }}-Setup.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
