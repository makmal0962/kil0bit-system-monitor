name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 1.4.1)'
        required: true
        default: '2.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Set Version in Project
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $csproj = "Kil0bitSystemMonitor.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csproj
        Write-Host "Set version to $version in $csproj"

    - name: Restore dependencies
      run: dotnet restore Kil0bitSystemMonitor.csproj

    - name: Publish Portable EXE
      run: |
        dotnet publish Kil0bitSystemMonitor.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o release-output

    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 4.0.1

    - name: Build MSI Installer
      run: |
        # WiX v4 requires extensions to be added
        wix extension add WixToolset.UI.wixext --global
        wix build wix/main.wxs -ext WixToolset.UI.wixext -d "publish=release-output" -o Kil0bitSystemMonitor-Setup.msi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Kil0bit System Monitor v${{ github.event.inputs.version }}
        draft: true
        prerelease: false
        body: |
          ## Kil0bit System Monitor v${{ github.event.inputs.version }}
          
          The ultimate high-precision telemetry overlay for Windows 11.
          
          ### 📦 Artifacts
          - **`Kil0bitSystemMonitor.exe`**: Portable Single-File Binary.
          - **`Kil0bitSystemMonitor-Setup.msi`**: Professional Installer.
          
          ### 🚀 Changes
          - Refined interactive Home dashboard.
          - Smart startup background/foreground detection.
          - Multi-monitor High-DPI precision.
          - Ultra-low CPU usage (<0.5%).
        files: |
          release-output/Kil0bitSystemMonitor.exe
          Kil0bitSystemMonitor-Setup.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
