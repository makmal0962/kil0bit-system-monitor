name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 3.0.0)'
        required: true
        default: '3.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Set Version in Project
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $csproj = "Kil0bitSystemMonitor.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csproj
        Write-Host "Set version to $version in $csproj"

    - name: Restore dependencies
      run: dotnet restore Kil0bitSystemMonitor.csproj

    - name: Publish (Framework-Dependent)
      run: |
        dotnet publish Kil0bitSystemMonitor.csproj `
          -c Release `
          --self-contained false `
          -p:PublishSingleFile=false `
          -p:DebugType=none `
          -p:DebugSymbols=false `
          -o release-output

    - name: Build Inno Setup Installer
      shell: pwsh
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss /DAppVersion=${{ github.event.inputs.version }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Kil0bit System Monitor v${{ github.event.inputs.version }}
        draft: true
        prerelease: false
        body: |
          # Kil0bit System Monitor v${{ github.event.inputs.version }} Gold Release

          ### 🚀 What's New
          - **Multi-Disk Monitoring**: Track activity across all drives with a dynamic 3x3 layout.
          - **Lightweight Evolution**: Dropped WinUI 3 for a lean WPF + Win32 engine.
          - **High-Res Branding**: 32-bit ARGB multi-resolution icon support.
          - **Admin-Less Stability**: Access telemetry without UAC prompts.
          
          (See README.md for full installation guide.)
        files: |
          Output/Kil0bitSystemMonitor-v${{ github.event.inputs.version }}-Setup.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
