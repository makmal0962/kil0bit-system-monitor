name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  check-bump:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      is_bump: ${{ steps.detect.outputs.is_bump }}
      version: ${{ steps.detect.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect version bump
        id: detect
        shell: bash
        run: |
          # Get current version
          CUR_VER=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          
          # Get previous version (from parent commit)
          # We use HEAD~1 to look at the previous state of the file
          PREV_VER=$(git show HEAD~1:Cargo.toml | grep '^version' | head -1 | sed 's/version = "\(.*\)"/\1/')
          
          echo "Current: $CUR_VER, Previous: $PREV_VER"
          
          if [ "$CUR_VER" != "$PREV_VER" ]; then
            echo "is_bump=true" >> $GITHUB_OUTPUT
            echo "version=$CUR_VER" >> $GITHUB_OUTPUT
          else
            echo "is_bump=false" >> $GITHUB_OUTPUT
          fi

  release:
    needs: [ check-bump ]
    if: |
      always() && (
        (github.event_name == 'push' && needs.check-bump.outputs.is_bump == 'true') ||
        github.event_name == 'workflow_dispatch'
      )
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Set version (auto trigger)
        if: github.event_name == 'push'
        shell: bash
        run: echo "RELEASE_VERSION=${{ needs.check-bump.outputs.version }}" >> $GITHUB_ENV

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2

      - name: Build Release EXE
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI Installer
        run: cargo wix --no-build --nocapture

      - name: Push version tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ env.RELEASE_VERSION }}" || true
          git push origin "v${{ env.RELEASE_VERSION }}" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (Draft)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.RELEASE_VERSION }}
          name: kil0bit System Monitor v${{ env.RELEASE_VERSION }}
          draft: true
          prerelease: false
          body: |
            ## kil0bit System Monitor v${{ env.RELEASE_VERSION }}

            A low-latency hardware telemetry overlay for the Windows taskbar.

            ### Download
            - **`kil0bit-system-monitor-setup.msi`** — Installer (recommended)
            - **`kil0bit-system-monitor.exe`** — Portable binary (no install needed)

            See [CHANGELOG.md](https://github.com/kil0bit-kb/kil0bit-system-monitor/blob/main/CHANGELOG.md) for what's new.
          files: |
            target/release/kil0bit-system-monitor.exe
            target/wix/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
