name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New Version (e.g. 1.4.1)'
        required: true
        default: '2.0.0'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Set Version in Project
      shell: pwsh
      run: |
        $version = "${{ github.event.inputs.version }}"
        $csproj = "Kil0bitSystemMonitor.csproj"
        (Get-Content $csproj) -replace '<Version>.*</Version>', "<Version>$version</Version>" | Set-Content $csproj
        Write-Host "Set version to $version in $csproj"

    - name: Restore dependencies
      run: dotnet restore Kil0bitSystemMonitor.csproj

    - name: Publish Portable EXE
      run: |
        dotnet publish Kil0bitSystemMonitor.csproj `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -p:PublishSingleFile=true `
          -o release-output

    - name: Install WiX Toolset
      run: dotnet tool install --global wix --version 4.0.1

    - name: Build MSI Installer
      run: |
        # Pin to stable v5.0.2 to avoid unstable v6 auto-updates
        dotnet tool install --global wix --version 5.0.2 || dotnet tool update --global wix --version 5.0.2
        wix extension add WixToolset.UI.wixext/5.0.2 --global
        wix build wix/main.wxs -ext WixToolset.UI.wixext -d "publish=release-output" -o Kil0bitSystemMonitor-Setup.msi

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.event.inputs.version }}
        name: Kil0bit System Monitor v${{ github.event.inputs.version }}
        draft: true
        prerelease: false
        body: |
          ## Kil0bit System Monitor v${{ github.event.inputs.version }}
          
          The ultimate high-precision telemetry overlay for Windows 11.
          
          ### 📦 Artifacts
          - **`Kil0bitSystemMonitor.exe`**: Portable Single-File Binary.
          - **`Kil0bitSystemMonitor-Setup.msi`**: Professional Installer.
          
          ### 🌟 The Rebirth (v2.0.0)
          
          Welcome to the new era of Kil0bit System Monitor. This version represents a complete architectural reconstruction, moving from legacy Rust code to a modern, high-precision **C#/.NET 10** and **WinUI 3** foundation.
          
          ### ✨ Key Highlights
          - **🚀 Native WinUI 3 Rebirth** — Fully redesigned using the Windows App SDK for a stunning, native Windows 11 Fluent look.
          - **⚙️ High-Precision Telemetry** — Built on low-level Win32 APIs and GDI+ for near-zero CPU usage (<0.5%).
          - **🧪 Zero-Dependency Packaging** — Self-contained deployment. No .NET runtime or SDK downloads required!
          - **📦 Professional Installer** — New MSI setup with custom installation path support and Start/Desktop integration.
          - **🏠 Interactive Dashboard** — A new Home control center with dynamic telemetry and quick-link navigation.
          - **📏 High-DPI & Multi-Monitor** — Native support for 4K scaling and precise overlay positioning.
        files: |
          release-output/Kil0bitSystemMonitor.exe
          Kil0bitSystemMonitor-Setup.msi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
